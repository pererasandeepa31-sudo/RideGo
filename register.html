<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideGo | Register</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Arial, sans-serif;
      background: #020202;
      color: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(255, 102, 0, 0.18), transparent 18%),
                  linear-gradient(180deg, #050505 0%, #101010 100%);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      flex-direction: column;
    }

    .overlay video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay-copy {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
      padding: 24px;
      max-width: 640px;
    }

    .overlay-copy h2 {
      margin: 0 0 14px;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: 0.08em;
    }

    .overlay-copy p {
      margin: 0;
      color: #ffd8a8;
      font-size: 1rem;
      line-height: 1.8;
    }

    .overlay-copy .countdown {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #ff9f1c;
      letter-spacing: 0.04em;
    }

    .hidden {
      display: none !important;
    }

    .container {
      width: min(520px, 100%);
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid rgba(255, 153, 0, 0.18);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 40px 90px rgba(0, 0, 0, 0.35);
    }

    .brand {
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      font-weight: 700;
      color: #ff9f1c;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .headline {
      margin: 0 0 24px;
      font-size: clamp(2rem, 2.6vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .description {
      margin: 0 0 28px;
      color: #d4d4d4;
      line-height: 1.8;
    }

    .form-group {
      display: grid;
      gap: 18px;
    }

    select,
    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 159, 28, 0.18);
      background: rgba(22, 22, 22, 0.95);
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    select:focus,
    input:focus {
      border-color: #ff8c00;
      box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.14);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(135deg, #ff8c00 0%, #ff5500 100%);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(255, 137, 0, 0.24);
    }

    #msg {
      margin-top: 18px;
      color: #ffd8a8;
      font-weight: 600;
      min-height: 24px;
    }

    .footer {
      margin-top: 24px;
      color: #cbd5e1;
      font-size: 0.95rem;
      text-align: center;
    }

    .footer a {
      color: #ff9f1c;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="introOverlay" class="overlay">
    <video id="introVideo" autoplay muted playsinline>
      <source src="intro.mp4" type="video/mp4">
      Your browser does not support the intro video.
    </video>
    <div class="overlay-copy">
      <h2>Welcome to RideGo</h2>
      <p>Preparing your registration experience. Please wait while we load the page.</p>
      <p id="countdownText" class="countdown">Loading... 7s</p>
    </div>
  </div>

  <div id="registerPage" class="container hidden">
    <div class="brand" style="display:flex; align-items:center; gap:8px;"><img src="logo.png" alt="RideGo" style="height:32px; width:auto;"><span>RideGo registration</span></div>
    <h1 class="headline">Create your account</h1>
    <p class="description">Join RideGo and start booking or driving with a sleek, safe, and reliable platform.</p>

    <div class="form-group">
      <label>
        Account type
        <select id="type">
          <option value="user">User</option>
          <option value="driver">Driver</option>
        </select>
      </label>

      <label>
        Full name
        <input id="name" type="text" placeholder="Enter your name">
      </label>

      <label>
        Phone number
        <input id="phone" type="tel" placeholder="Enter your phone number">
      </label>
    </div>

    <button onclick="register()">Register now</button>
    <p id="msg"></p>
    <p class="footer">Already registered? <a href="login.html" style="color:#ff9f1c; text-decoration:none;">Log in here</a>.</p>
  </div>

  <script>
    const msg = document.getElementById('msg');

    function validateRegister() {
      const type = document.getElementById('type').value;
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name) {
        msg.textContent = '⚠️ Please enter your name.';
        return null;
      }
      if (!phone) {
        msg.textContent = '⚠️ Please enter your phone number.';
        return null;
      }
      if (!/^[0-9]{8,14}$/.test(phone)) {
        msg.textContent = '⚠️ Enter a valid phone number (digits only).';
        return null;
      }

      return { type, name, phone };
    }

    function register() {
      const user = validateRegister();
      if (!user) return;

      fetch('http://localhost:3000/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
      })
      .then(response => response.json())
      .then(data => {
        if (data && data.success !== false) {
          msg.textContent = '✅ Registered Successfully! Redirecting to login...';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1200);
        } else {
          msg.textContent = data.message || '⚠️ Registration failed. Please try again.';
        }
      })
      .catch(() => {
        msg.textContent = '⚠️ Unable to connect to the server.';
      });
    }

    const introOverlay = document.getElementById('introOverlay');
    const registerPage = document.getElementById('registerPage');
    const countdownText = document.getElementById('countdownText');
    let countdown = 7;

    const timer = setInterval(() => {
      countdown -= 1;
      if (countdown <= 0) {
        countdownText.textContent = 'Loading...';
        clearInterval(timer);
        return;
      }
      countdownText.textContent = `Loading... ${countdown}s`;
    }, 1000);

    window.addEventListener('load', () => {
      setTimeout(() => {
        introOverlay.classList.add('hidden');
        registerPage.classList.remove('hidden');
      }, 7000);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideGo | Login</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Arial, sans-serif;
      background: #020202;
      color: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(255, 102, 0, 0.18), transparent 18%),
                  linear-gradient(180deg, #050505 0%, #101010 100%);
    }

    .container {
      width: min(520px, 100%);
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid rgba(255, 153, 0, 0.18);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 40px 95px rgba(0, 0, 0, 0.35);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #ff9f1c;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .hero {
      margin: 0 0 20px;
      font-size: clamp(2.2rem, 3vw, 3rem);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .subtext {
      margin: 0 0 28px;
      color: #d4d4d4;
      line-height: 1.8;
    }

    .form-group {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 10px;
      color: #d4d4d4;
      font-size: 0.95rem;
    }

    select,
    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 159, 28, 0.18);
      background: rgba(22, 22, 22, 0.95);
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    select:focus,
    input:focus {
      border-color: #ff8c00;
      box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.14);
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(135deg, #ff8c00 0%, #ff5500 100%);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(255, 137, 0, 0.24);
    }

    #msg {
      margin-top: 18px;
      color: #ffd8a8;
      font-weight: 600;
      min-height: 24px;
    }

    .footer {
      margin-top: 24px;
      color: #cbd5e1;
      font-size: 0.95rem;
      text-align: center;
    }

    .footer a {
      color: #ff9f1c;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand" style="display:flex; align-items:center; gap:8px;"><img src="logo.png" alt="RideGo" style="height:32px; width:auto;"><span>RideGo Login</span></div>
    <h1 class="hero">Welcome back</h1>
    <p class="subtext">Sign in to manage your rides, track drivers, and stay connected with the RideGo platform.</p>

    <div class="form-group">
      <label>
        Account type
        <select id="type">
          <option value="user">User</option>
          <option value="driver">Driver</option>
        </select>
      </label>

      <label>
        Phone number
        <input id="phone" type="tel" placeholder="Enter your phone number">
      </label>
    </div>

    <button class="button" onclick="login()">Login</button>
    <p id="msg"></p>
    <p class="footer">New to RideGo? <a href="register.html">Create an account</a></p>
  </div>

  <script>
    const msg = document.getElementById('msg');

    function validateLogin() {
      const phone = document.getElementById('phone').value.trim();
      const type = document.getElementById('type').value;

      if (!phone) {
        msg.textContent = '⚠️ Please enter your phone number.';
        return null;
      }
      if (!/^[0-9]{8,14}$/.test(phone)) {
        msg.textContent = '⚠️ Enter a valid phone number (digits only).';
        return null;
      }

      return { phone, type };
    }

    function login() {
      const user = validateLogin();
      if (!user) return;

      fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
      })
      .then(response => response.json())
      .then(data => {
        const type = user.type;
        if (data && data.success) {
          msg.textContent = '✅ Login success. Redirecting...';
          localStorage.setItem('ridegoUserType', type);
          localStorage.setItem('ridegoUserPhone', user.phone);
          setTimeout(() => {
            if (type === 'driver') {
              window.location.href = 'driver.html';
            } else {
              window.location.href = 'home.html';
            }
          }, 1000);
        } else {
          msg.textContent = (data && data.message) ? data.message : '❌ Login failed. Check your phone and type.';
        }
      })
      .catch(() => {
        msg.textContent = '⚠️ Unable to connect to the server.';
      });
    }
  </script>
</body>
</html>
